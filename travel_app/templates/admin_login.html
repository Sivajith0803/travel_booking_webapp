<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Trip - Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" xintegrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page-body">

    <div class="login-container animate-on-load">
        <div class="login-header">
            <i class="fas fa-user-cog login-icon"></i> <!-- Reverted to icon -->
            <h2>Smart Trip Admin Login</h2> <!-- Updated text -->
            <p>Access the Smart Trip administration dashboard.</p>
        </div>
        <form id="admin-login-form" class="login-form">
            <div class="input-group">
                <i class="fas fa-user-shield icon"></i>
                <input type="text" id="admin-username" placeholder="Admin Username" required>
            </div>
            <div class="input-group">
                <i class="fas fa-key icon"></i>
                <input type="password" id="admin-password" placeholder="Admin Password" required>
            </div>
            <button type="submit" class="login-button">Login as Admin</button>
        </form>
        <p class="login-footer"><a href="/login">Back to User Login</a></p>
    </div>

    <!-- Custom Booking/Message Modal -->
    <div id="booking-modal" class="modal-overlay">
        <div class="modal-content bounce-in">
            <span class="close-button">&times;</span>
            <h2>Message</h2>
            <p id="modal-message"></p>
            <button class="modal-ok-button">OK</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
