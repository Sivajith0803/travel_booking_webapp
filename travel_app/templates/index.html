<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Trip</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" xintegrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Link your CSS file -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="main-page-body">

    <header class="hero-section">
        <nav class="navbar">
            <a href="/" class="logo"><i class="fas fa-plane-departure"></i> Smart Trip</a> <!-- Reverted to icon + text -->
            <div class="nav-links">
                <a href="#flight-search-section">Flights</a>
                <a href="#hotel-search-section">Hotels</a>
                <a href="/login" class="login-link">Login <i class="fas fa-sign-in-alt"></i></a>
                <a href="/admin_login" class="login-link">Admin <i class="fas fa-user-shield"></i></a>
            </div>
        </nav>
        <div class="hero-content animate-on-load">
            <h1>Your Journey Begins Here</h1>
            <p class="delay-1">Discover amazing destinations and seamless bookings with Smart Trip.</p>
            <a href="#flight-search-section" class="hero-button delay-2">Start Your Search <i class="fas fa-arrow-down"></i></a>
        </div>
    </header>

    <main class="animate-on-load delay-3">
        <p class="welcome-message">Welcome, {{ user_name }}!</p>
        <section id="flight-search-section" class="search-section">
            <h2><i class="fas fa-plane"></i> Search Flights</h2>
            <form id="flight-search-form" class="search-form">
                <div class="input-group">
                    <i class="fas fa-plane-departure icon"></i>
                    <input type="text" id="flight-origin" placeholder="Origin (e.g., MAA)" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-plane-arrival icon"></i>
                    <input type="text" id="flight-destination" placeholder="Destination (e.g., DEL)" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-calendar-alt icon"></i>
                    <input type="date" id="flight-date">
                </div>
                <button type="submit" class="search-button"><i class="fas fa-search"></i> Search Flights</button>
            </form>
            <div id="flight-results" class="results-container"></div>
        </section>

        <section id="hotel-search-section" class="search-section">
            <h2><i class="fas fa-hotel"></i> Search Hotels</h2>
            <form id="hotel-search-form" class="search-form">
                <div class="input-group">
                    <i class="fas fa-map-marker-alt icon"></i>
                    <input type="text" id="hotel-location" placeholder="Location (e.g., Chennai)" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-calendar-alt icon"></i>
                    <input type="date" id="hotel-check-in" title="Check-in Date">
                </div>
                <div class="input-group">
                    <i class="fas fa-calendar-alt icon"></i>
                    <input type="date" id="hotel-check-out" title="Check-out Date">
                </div>
                <button type="submit" class="search-button"><i class="fas fa-search"></i> Search Hotels</button>
            </form>
            <div id="hotel-results" class="results-container"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Smart Trip. All rights reserved.</p>
        <p><a href="/logout" style="color: white; text-decoration: underline;">Logout</a></p>
    </footer>

    <!-- Booking Confirmation Modal Structure -->
    <div id="booking-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h3>Booking Confirmation</h3>
            <p id="modal-message"></p>
            <button class="modal-ok-button">OK</button>
        </div>
    </div>

    <!-- Link your JavaScript file -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
