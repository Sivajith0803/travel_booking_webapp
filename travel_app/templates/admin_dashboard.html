<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Trip - Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" xintegrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Specific styles for admin dashboard table */
        .dashboard-results table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 10px;
            overflow: hidden; /* Ensures rounded corners apply to table */
        }

        .dashboard-results th,
        .dashboard-results td {
            border: 1px solid #e0e0e0;
            padding: 12px 15px;
            text-align: left;
        }

        .dashboard-results th {
            background-color: #f2f2f2;
            font-weight: bold;
            color: var(--primary-blue);
            text-transform: uppercase;
            font-size: 0.9em;
        }

        .dashboard-results tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .dashboard-results tr:hover {
            background-color: #e9f5ff;
        }

        .dashboard-results td {
            font-size: 0.95em;
            color: var(--text-color);
        }

        .dashboard-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .dashboard-controls button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        #view-registrations-btn {
            background-color: var(--primary-blue);
            color: var(--white);
        }
        #view-registrations-btn:hover {
            background-color: var(--dark-blue);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 123, 255, 0.3);
        }

        #view-bookings-btn {
            background-color: var(--accent-green);
            color: var(--white);
        }
        #view-bookings-btn:hover {
            background-color: var(--dark-green);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(40, 167, 69, 0.3);
        }

        .admin-logout-button {
            background-color: #dc3545; /* Red for logout */
            color: var(--white);
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            position: absolute; /* Position relative to header */
            top: 20px;
            right: 20px;
        }
        .admin-logout-button:hover {
            background-color: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        /* Adjust main padding for admin dashboard */
        .admin-main {
            padding-top: 80px; /* Make space for logout button */
            position: relative; /* For positioning logout button */
        }
    </style>
</head>
<body class="admin-page-body">

    <header class="hero-section">
        <nav class="navbar">
            <a href="/admin_dashboard" class="logo"><i class="fas fa-user-shield"></i> Smart Trip Admin</a>
            <div class="nav-links">
                <a href="/">User Site</a>
            </div>
        </nav>
        <div class="hero-content animate-on-load">
            <h1>Smart Trip Administration Panel</h1>
            <p class="delay-1">Manage users and bookings for Smart Trip.</p>
        </div>
        <button class="admin-logout-button" onclick="location.href='/admin_logout'">Logout</button>
    </header>

    <main class="admin-main animate-on-load delay-3">
        <section id="admin-dashboard-section">
            <h2><i class="fas fa-chart-line"></i> Dashboard Data</h2>
            <div class="dashboard-controls">
                <button id="view-registrations-btn"><i class="fas fa-users"></i> View Registered Users</button>
                <button id="view-bookings-btn"><i class="fas fa-book"></i> View All Bookings</button>
            </div>
            <div id="dashboard-results" class="results-container">
                <p class="info-message">Select an option above to view data.</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Smart Trip Admin. All rights reserved.</p>
    </footer>

    <!-- Custom Booking/Message Modal (reused for admin messages) -->
    <div id="booking-modal" class="modal-overlay">
        <div class="modal-content bounce-in">
            <span class="close-button">&times;</span>
            <h2>Message</h2>
            <p id="modal-message"></p>
            <button class="modal-ok-button">OK</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
